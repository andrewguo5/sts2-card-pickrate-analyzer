<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STS2 Card Pick Rate Analyzer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <!-- Component imports -->
    <script src="glossary.js"></script>
    <script src="components/config.js"></script>
    <script src="components/InfoIcon.js"></script>
    <script src="components/HelpPanel.js"></script>
    <script src="components/ChartComponent.js"></script>
    <script src="components/SkipRateChart.js"></script>
    <script src="components/WinRateChart.js"></script>
    <script src="components/FilterBar.js"></script>
    <script src="components/MetadataBar.js"></script>
    <script src="components/CardList.js"></script>
    <script src="components/PickRateTab.js"></script>
    <script src="components/SkipRateTab.js"></script>
    <script src="components/WinRateTab.js"></script>
    <script src="components/CardScatterPlot.js"></script>
    <script src="components/VisualizationTab.js"></script>
    <script src="components/CardDetail.js"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useMemo } = React;
        const { API_BASE_URL, CHARACTERS, MODES, ASCENSIONS } = window.AppConfig;

        function App() {
            const [data, setData] = useState(null);
            const [selectedCard, setSelectedCard] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [selectedCharacter, setSelectedCharacter] = useState('regent');
            const [selectedMode, setSelectedMode] = useState('singleplayer');
            const [selectedAscension, setSelectedAscension] = useState('a10');
            const [selectedUser, setSelectedUser] = useState(null); // null = global stats
            const [usersList, setUsersList] = useState([]);
            const [usernameCache, setUsernameCache] = useState({});
            const [filteredRunCounts, setFilteredRunCounts] = useState({}); // steam_id -> filtered count
            const [sortBy, setSortBy] = useState('offered');
            const [filterType, setFilterType] = useState('all');
            const [filterRarity, setFilterRarity] = useState('all');
            const [activeTab, setActiveTab] = useState('pickrate');
            const [isGlossaryOpen, setIsGlossaryOpen] = useState(false);
            const [coordinateData, setCoordinateData] = useState(null);
            const [loadingCoordinates, setLoadingCoordinates] = useState(false);
            const [viewMode, setViewMode] = useState('table'); // 'table' or 'visualization'

            // Apply character theme colors
            useEffect(() => {
                const character = CHARACTERS.find(c => c.id === selectedCharacter);
                if (character && character.colors) {
                    const root = document.documentElement;
                    root.style.setProperty('--char-primary', character.colors.primary);
                    root.style.setProperty('--char-secondary', character.colors.secondary);
                    root.style.setProperty('--char-accent', character.colors.accent);
                    root.style.setProperty('--char-gradient', character.colors.gradient);
                }
            }, [selectedCharacter]);

            // Fetch users list on mount
            useEffect(() => {
                fetch(`${API_BASE_URL}/api/analytics/users`)
                    .then(response => response.json())
                    .then(users => {
                        setUsersList(users);
                        // Fetch usernames for all users
                        const steamIds = users.map(u => u.steam_id).join(',');
                        if (steamIds) {
                            fetch(`${API_BASE_URL}/api/steam/usernames?steam_ids=${steamIds}`)
                                .then(response => response.json())
                                .then(names => setUsernameCache(names))
                                .catch(err => console.error('Error fetching usernames:', err));
                        }
                    })
                    .catch(err => console.error('Error fetching users:', err));
            }, []);

            // Fetch filtered run counts when character/mode/ascension changes
            useEffect(() => {
                const params = new URLSearchParams({
                    character: selectedCharacter,
                    mode: selectedMode,
                    ascension: selectedAscension
                });

                fetch(`${API_BASE_URL}/api/analytics/users/filtered-counts?${params}`)
                    .then(response => response.json())
                    .then(counts => setFilteredRunCounts(counts))
                    .catch(err => console.error('Error fetching filtered run counts:', err));
            }, [selectedCharacter, selectedMode, selectedAscension]);

            // Fetch coordinate data when filters change
            useEffect(() => {
                setLoadingCoordinates(true);

                const params = new URLSearchParams({
                    character: selectedCharacter,
                    mode: selectedMode,
                    ascension: selectedAscension
                });

                if (selectedUser) {
                    params.append('steam_id', selectedUser);
                }

                fetch(`${API_BASE_URL}/api/analytics/card-coordinates?${params}`)
                    .then(response => response.json())
                    .then(data => {
                        setCoordinateData(data);
                        setLoadingCoordinates(false);
                    })
                    .catch(err => {
                        console.error('Error fetching coordinate data:', err);
                        setCoordinateData(null);
                        setLoadingCoordinates(false);
                    });
            }, [selectedCharacter, selectedMode, selectedAscension, selectedUser]);

            // Track previous filter values to detect what changed
            const prevFiltersRef = React.useRef({
                character: selectedCharacter,
                mode: selectedMode,
                ascension: selectedAscension,
                user: selectedUser
            });

            useEffect(() => {
                setLoading(true);
                setError(null);

                // Only clear selected card if character/mode/ascension changed
                // Preserve it if only user changed (allows comparing same card across users)
                const prevFilters = prevFiltersRef.current;
                const onlyUserChanged = (
                    prevFilters.character === selectedCharacter &&
                    prevFilters.mode === selectedMode &&
                    prevFilters.ascension === selectedAscension &&
                    prevFilters.user !== selectedUser
                );

                if (!onlyUserChanged) {
                    setSelectedCard(null);
                    setActiveTab('pickrate'); // Reset to default tab when changing character/mode/ascension
                }
                // If only user changed, preserve both selected card AND active tab

                // Update ref for next time
                prevFiltersRef.current = {
                    character: selectedCharacter,
                    mode: selectedMode,
                    ascension: selectedAscension,
                    user: selectedUser
                };

                // Build API request params
                const params = new URLSearchParams({
                    character: selectedCharacter,
                    mode: selectedMode,
                    ascension: selectedAscension
                });

                // Choose endpoint based on whether a user is selected
                let endpoint;
                if (selectedUser) {
                    params.append('steam_id', selectedUser);
                    endpoint = `${API_BASE_URL}/api/analytics/user-stats?${params}`;
                } else {
                    endpoint = `${API_BASE_URL}/api/analytics/global-stats?${params}`;
                }

                fetch(endpoint)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`API error: ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(jsonData => {
                        setData(jsonData);
                        setLoading(false);

                        // If a card was selected and only user changed, update the selected card with new data
                        if (onlyUserChanged && selectedCard) {
                            const newCardData = jsonData.cards[selectedCard.id];
                            if (newCardData) {
                                setSelectedCard({
                                    id: selectedCard.id,
                                    name: newCardData.summary.name || selectedCard.id.replace('CARD.', ''),
                                    ...newCardData.summary,
                                    rawData: newCardData.raw_data,
                                    rawPickrates: newCardData.raw_pickrates,
                                    smoothedPickrates: newCardData.smoothed_pickrates,
                                    rawSkiprates: newCardData.raw_skiprates,
                                    smoothedSkiprates: newCardData.smoothed_skiprates,
                                    skip_data: newCardData.skip_data,
                                    winrates_by_act: newCardData.winrates_by_act,
                                    winrate_data: newCardData.winrate_data
                                });
                            } else {
                                // Card doesn't exist in new data (e.g., user hasn't seen it), clear selection
                                setSelectedCard(null);
                            }
                        }
                    })
                    .catch(error => {
                        console.error('Error loading data:', error);
                        setError(error.message);
                        setData(null);
                        setLoading(false);
                    });
            }, [selectedCharacter, selectedMode, selectedAscension, selectedUser]);

            const sortedCards = useMemo(() => {
                if (!data) return [];

                let cards = Object.entries(data.cards)
                    .map(([cardId, cardData]) => ({
                        id: cardId,
                        name: cardData.summary.name || cardId.replace('CARD.', ''),
                        ...cardData.summary,
                        rawData: cardData.raw_data,
                        rawPickrates: cardData.raw_pickrates,
                        smoothedPickrates: cardData.smoothed_pickrates,
                        rawSkiprates: cardData.raw_skiprates,
                        smoothedSkiprates: cardData.smoothed_skiprates,
                        skip_data: cardData.skip_data,
                        winrates_by_act: cardData.winrates_by_act,
                        winrate_data: cardData.winrate_data
                    }));

                // Apply filters
                cards = cards.filter(card => {
                    // Search filter
                    if (searchTerm && !card.name.toLowerCase().includes(searchTerm.toLowerCase())) {
                        return false;
                    }

                    // Type filter
                    if (filterType !== 'all' && card.type !== filterType) {
                        return false;
                    }

                    // Rarity filter
                    if (filterRarity !== 'all' && card.rarity !== filterRarity) {
                        return false;
                    }

                    return true;
                });

                // Apply sorting
                cards.sort((a, b) => {
                    if (sortBy === 'offered') {
                        return b.total_offered - a.total_offered;
                    } else if (sortBy === 'pickrate') {
                        return b.overall_pickrate - a.overall_pickrate;
                    } else if (sortBy === 'winrate') {
                        // Sort by overall win rate (highest first)
                        const aWinRate = a.winrates_by_act?.overall || 0;
                        const bWinRate = b.winrates_by_act?.overall || 0;
                        return bWinRate - aWinRate;
                    } else if (sortBy === 'skiprate') {
                        // Sort by skip rate (least skipped first = lowest skip rate first)
                        // Calculate overall skip rate from skip_data
                        const aSkipped = Object.values(a.skip_data || {}).reduce((sum, data) => sum + (data.skipped || 0), 0);
                        const aOffered = Object.values(a.skip_data || {}).reduce((sum, data) => sum + (data.offered || 0), 0);
                        const aSkipRate = aOffered > 0 ? aSkipped / aOffered : 1;

                        const bSkipped = Object.values(b.skip_data || {}).reduce((sum, data) => sum + (data.skipped || 0), 0);
                        const bOffered = Object.values(b.skip_data || {}).reduce((sum, data) => sum + (data.offered || 0), 0);
                        const bSkipRate = bOffered > 0 ? bSkipped / bOffered : 1;

                        return aSkipRate - bSkipRate; // Ascending order (least skipped first)
                    } else if (sortBy === 'alphabetical') {
                        return a.name.localeCompare(b.name);
                    }
                    return 0;
                });

                return cards;
            }, [data, searchTerm, sortBy, filterType, filterRarity]);

            const chartData = useMemo(() => {
                if (!selectedCard) return [];

                const floors = Object.keys(selectedCard.smoothedPickrates).map(Number).sort((a, b) => a - b);

                return floors.map(floor => ({
                    floor,
                    raw: selectedCard.rawPickrates[floor] * 100,
                    smoothed: selectedCard.smoothedPickrates[floor] * 100,
                    offered: selectedCard.rawData[floor].offered,
                    picked: selectedCard.rawData[floor].picked
                }));
            }, [selectedCard]);

            const skipRateData = useMemo(() => {
                if (!selectedCard || !selectedCard.smoothedSkiprates) return [];

                const floors = Object.keys(selectedCard.smoothedSkiprates).map(Number).sort((a, b) => a - b);

                return floors.map(floor => ({
                    floor,
                    raw: (selectedCard.rawSkiprates[floor] || 0) * 100,
                    smoothed: (selectedCard.smoothedSkiprates[floor] || 0) * 100,
                    baseline: data.baseline_skip_data?.smoothed?.[floor] ? data.baseline_skip_data.smoothed[floor] * 100 : undefined,
                    offered: selectedCard.skip_data?.[floor]?.offered || 0,
                    skipped: selectedCard.skip_data?.[floor]?.skipped || 0
                }));
            }, [selectedCard, data]);

            const winRateData = useMemo(() => {
                if (!selectedCard || !selectedCard.winrates_by_act) return [];

                // Filter out "overall" key and only include numeric act keys
                const acts = Object.keys(selectedCard.winrates_by_act)
                    .filter(key => key !== 'overall')
                    .map(Number)
                    .sort((a, b) => a - b);

                return acts.map(act => ({
                    act,
                    winrate: (selectedCard.winrates_by_act[act] || 0) * 100,
                    picked: selectedCard.winrate_data?.[act]?.picked || 0,
                    won: selectedCard.winrate_data?.[act]?.won || 0
                }));
            }, [selectedCard]);

            return React.createElement('div', { className: 'container' },
                // Scrollable content wrapper
                React.createElement('div', { className: 'scrollable-content' },
                    // Header
                    React.createElement('div', { className: 'header' },
                        React.createElement('h1', null, 'STS2 Card Pick Rate Analyzer'),
                        React.createElement('div', { className: 'subtitle' }, 'Card pick rates by floor')
                    ),

                    // FilterBar (sticky within scrollable content)
                    React.createElement(window.FilterBar, {
                        selectedCharacter,
                        setSelectedCharacter,
                        selectedMode,
                        setSelectedMode,
                        selectedAscension,
                        setSelectedAscension,
                        selectedUser,
                        setSelectedUser,
                        usersList,
                        usernameCache,
                        filteredRunCounts,
                        onOpenGlossary: () => setIsGlossaryOpen(true)
                    }),

                    // MetadataBar
                    data && React.createElement(window.MetadataBar, {
                        metadata: data.metadata,
                        usernameCache: usernameCache
                    }),

                    // View mode switcher
                    React.createElement('div', {
                        className: 'view-mode-switcher',
                        style: {
                            display: 'flex',
                            justifyContent: 'center',
                            gap: '10px',
                            margin: '20px 0',
                            padding: '10px',
                            backgroundColor: 'rgba(255, 255, 255, 0.05)',
                            borderRadius: '8px'
                        }
                    },
                        React.createElement('button', {
                            className: viewMode === 'table' ? 'tab-button active' : 'tab-button',
                            onClick: () => setViewMode('table'),
                            style: { minWidth: '150px' }
                        }, '📊 Table View'),
                        React.createElement('button', {
                            className: viewMode === 'visualization' ? 'tab-button active' : 'tab-button',
                            onClick: () => setViewMode('visualization'),
                            style: { minWidth: '150px' }
                        }, '🎯 2D Visualization')
                    ),

                    // Content area
                viewMode === 'table' ? React.createElement('div', { className: 'content' },
                    // CardList sidebar
                    loading || error || !data
                        ? React.createElement('div', { className: 'sidebar' },
                            React.createElement('div', { className: 'loading', style: { padding: '20px', textAlign: 'center' } },
                                loading ? 'Loading...' : error ? `Error: ${error}` : 'No data available'
                            )
                        )
                        : React.createElement(window.CardList, {
                            cards: sortedCards,
                            selectedCard,
                            onSelectCard: setSelectedCard,
                            searchTerm,
                            onSearchChange: setSearchTerm,
                            sortBy,
                            onSortChange: setSortBy,
                            filterType,
                            onFilterTypeChange: setFilterType,
                            filterRarity,
                            onFilterRarityChange: setFilterRarity
                        }),

                    // CardDetail main panel
                    React.createElement('div', { className: 'main-panel' },
                        loading || error || !data
                            ? React.createElement('div', { className: 'loading', style: { padding: '40px', textAlign: 'center' } },
                                loading ? 'Loading...' : error ? `Error loading data: ${error}` : 'No data available'
                            )
                            : React.createElement(window.CardDetail, {
                                selectedCard,
                                chartData,
                                skipRateData,
                                winRateData,
                                baselineSkipData: data?.baseline_skip_data,
                                activeTab,
                                setActiveTab
                            })
                    )
                ) // End of table content
                : React.createElement('div', { className: 'visualization-view', style: { padding: '20px' } },
                    // Visualization view
                    loadingCoordinates
                        ? React.createElement('div', { className: 'loading', style: { padding: '40px', textAlign: 'center' } },
                            'Loading visualization...'
                        )
                        : React.createElement(window.VisualizationTab, {
                            coordinateData,
                            onCardClick: (cardId) => {
                                // Switch to table view and select the card
                                setViewMode('table');
                                if (data && data.cards && data.cards[cardId]) {
                                    const cardData = data.cards[cardId];
                                    setSelectedCard({
                                        id: cardId,
                                        name: cardData.summary.name || cardId.replace('CARD.', ''),
                                        ...cardData.summary,
                                        rawData: cardData.raw_data,
                                        rawPickrates: cardData.raw_pickrates,
                                        smoothedPickrates: cardData.smoothed_pickrates,
                                        rawSkiprates: cardData.raw_skiprates,
                                        smoothedSkiprates: cardData.smoothed_skiprates,
                                        skip_data: cardData.skip_data,
                                        winrates_by_act: cardData.winrates_by_act,
                                        winrate_data: cardData.winrate_data
                                    });
                                }
                            },
                            selectedCardId: selectedCard?.id,
                            character: selectedCharacter,
                            mode: selectedMode,
                            ascension: selectedAscension,
                            selectedUser
                        })
                ) // End of visualization content
                ), // End of scrollable-content

                // Glossary side panel (rendered outside scrollable content)
                React.createElement(window.HelpPanel, {
                    isOpen: isGlossaryOpen,
                    onClose: () => setIsGlossaryOpen(false)
                })
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
